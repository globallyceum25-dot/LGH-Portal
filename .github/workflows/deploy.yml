# ============================================================================
# Deploy Pipeline — Lyceum Global Holdings Portal
# ============================================================================
# Triggers:
#   - Automatically after CI passes on main
#   - On version tags (v*.*.*)
#   - Manual dispatch for production
#
# Stages: Docker Build & Push → Staging → Production
# ============================================================================

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 1: Docker Build & Push
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: 📦 Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run if CI succeeded (for workflow_run trigger) or on tags/manual
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 2: Deploy to Staging
  # ──────────────────────────────────────────────────────────────────────────
  staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker]
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: |
          # ── Guard: skip if secrets are not configured ──
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "⏭️  Skipping staging deploy — SSH secrets not configured."
            echo "   Configure these secrets in GitHub → Settings → Secrets:"
            echo "     • STAGING_DEPLOY_HOST"
            echo "     • STAGING_DEPLOY_USER"
            echo "     • STAGING_DEPLOY_SSH_KEY"
            exit 0
          fi

          echo "🚀 Deploying to staging..."
          echo "   Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          # ── SSH setup ──
          mkdir -p ~/.ssh
          echo "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          # ── Deploy via SSH ──
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" << 'DEPLOY_SCRIPT'
            set -euo pipefail

            echo "Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "Stopping old container..."
            docker stop lyceum-portal-staging 2>/dev/null || true
            docker rm lyceum-portal-staging 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name lyceum-portal-staging \
              --restart unless-stopped \
              -p 3001:3001 \
              -v lyceum-staging-data:/app/data \
              -e NODE_ENV=production \
              -e PORT=3001 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "Waiting for health check..."
            sleep 5
            curl -sf http://localhost:3001/api/health || echo "⚠️ Health check failed"

            echo "✅ Staging deployment complete!"
          DEPLOY_SCRIPT

      - name: Verify staging deployment
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          echo "🔍 Verifying staging deployment..."
          if [ -n "${STAGING_URL:-}" ]; then
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging is healthy (HTTP ${STATUS})"
            else
              echo "⚠️  Staging health check returned HTTP ${STATUS}"
            fi
          else
            echo "ℹ️  No STAGING_URL configured — skipping remote health check"
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 3: Deploy to Production
  # ──────────────────────────────────────────────────────────────────────────
  production:
    name: ✅ Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker, staging]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: |
          # ── Guard: skip if secrets are not configured ──
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "⏭️  Skipping production deploy — SSH secrets not configured."
            echo "   Configure these secrets in GitHub → Settings → Secrets:"
            echo "     • PRODUCTION_DEPLOY_HOST"
            echo "     • PRODUCTION_DEPLOY_USER"
            echo "     • PRODUCTION_DEPLOY_SSH_KEY"
            exit 0
          fi

          echo "🚀 Deploying to production..."
          echo "   Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          # ── SSH setup ──
          mkdir -p ~/.ssh
          echo "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          # ── Deploy via SSH ──
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" << 'DEPLOY_SCRIPT'
            set -euo pipefail

            echo "Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

            echo "Stopping old container..."
            docker stop lyceum-portal-production 2>/dev/null || true
            docker rm lyceum-portal-production 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name lyceum-portal-production \
              --restart unless-stopped \
              -p 3001:3001 \
              -v lyceum-prod-data:/app/data \
              -e NODE_ENV=production \
              -e PORT=3001 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

            echo "Waiting for health check..."
            sleep 5
            curl -sf http://localhost:3001/api/health || echo "⚠️ Health check failed"

            echo "✅ Production deployment complete!"
          DEPLOY_SCRIPT

      - name: Verify production deployment
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          echo "🔍 Verifying production deployment..."
          if [ -n "${PRODUCTION_URL:-}" ]; then
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${PRODUCTION_URL}/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production is healthy (HTTP ${STATUS})"
            else
              echo "⚠️  Production health check returned HTTP ${STATUS}"
            fi
          else
            echo "ℹ️  No PRODUCTION_URL configured — skipping remote health check"
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
